<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="Profile photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1f1f"></stop>
      <stop offset="100%" stop-color="#0a0a0a"></stop>
    </linearGradient>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <rect width="14" height="14" fill="transparent"></rect>
      <line x1="0" y1="0" x2="0" y2="14" stroke="rgba(229,9,20,0.06)" stroke-width="6"></line>
    </pattern>
  </defs>
  <rect width="500" height="500" fill="url(#bg)"></rect>
  <rect width="500" height="500" fill="url(#stripes)"></rect>
  <text x="250" y="260" text-anchor="middle" font-family="&#39;Bebas Neue&#39;, &#39;Oswald&#39;, Arial, sans-serif" font-weight="400" font-size="180" fill="#E50914" letter-spacing="8">SS</text>
  <text x="250" y="330" text-anchor="middle" font-family="&#39;Courier New&#39;, monospace" font-size="14" fill="#8c8c8c" letter-spacing="6">DROP PROFILE PHOTO HERE</text>
  <text x="250" y="355" text-anchor="middle" font-family="&#39;Courier New&#39;, monospace" font-size="11" fill="#555" letter-spacing="3">assets/profile.jpg · 500×500</text>
</svg>